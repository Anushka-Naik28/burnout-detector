<!DOCTYPE html>
<html>
<head>
    <title>Burnout Detector</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f7fa;
            text-align: center;
            padding: 50px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
        input {
            width: 90%;
            padding: 10px;
            margin-top: 10px;
        }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Burnout Detector</h2>

    <input type="text" id="input" placeholder="Enter how you feel..." />
    <br>

    <button onclick="predict()">Check Burnout</button>

    <div id="result"></div>
</div>

<script>
function predict() {
    const input = document.getElementById("input").value;

    fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ input: input })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText = "Result: " + data.result;
    });
}
</script>

</body>
</html>
