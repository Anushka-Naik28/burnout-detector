<div class="app-container">

  <!-- LEFT INPUT PANEL -->
  <div class="panel input-panel">
    <h2>🧠 Burnout Inputs</h2>

    <input id="sleep" placeholder="Sleep hours" type="number">
    <input id="stress" placeholder="Stress (0-10)" type="number">
    <input id="study" placeholder="Study hours" type="number">
    <input id="deadline" placeholder="Days to deadline" type="number">

    <input id="apiKey" placeholder="Gemini API Key (optional)" type="password">

    <button onclick="analyze()">Analyze Burnout</button>
  </div>

  <!-- CENTER DASHBOARD -->
  <div class="panel dashboard-panel">
    <h2>📊 Burnout Score</h2>
    <div id="resultCard" class="glass-card">
      <p>Enter data to analyze your burnout level</p>
    </div>

    <div id="history" class="history-box"></div>
  </div>

  <!-- RIGHT AI PANEL -->
  <div class="panel ai-panel">
    <h2>🤖 AI Assistant</h2>

    <div id="chat" class="chat-box"></div>

    <input id="userMsg" placeholder="Ask AI about your study plan...">
    <button onclick="sendMsg()">Send</button>
  </div>

</div>
