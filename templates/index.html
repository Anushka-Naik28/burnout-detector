<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Burnout Detector</title>

  <link rel="stylesheet" href="style.css">

  <!-- Chart.js for future graph -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">🧠 Burnout AI</div>
    <div class="tagline">Smart Study Assistant</div>

    <div class="nav-item active">📊 Dashboard</div>
    <div class="nav-item">🤖 AI Coach</div>
    <div class="nav-item">📈 Trends</div>
  </aside>

  <!-- MAIN AREA -->
  <main class="main">

    <!-- HEADER -->
    <header class="header">
      <h1>Burnout Intelligence Dashboard</h1>
      <p>Analyze, predict and optimize your study health</p>
    </header>

    <!-- GRID -->
    <section class="grid">

      <!-- INPUT CARD -->
      <div class="card glass">

        <h2>Input Metrics</h2>

        <label>Sleep Hours</label>
        <input id="sleep" type="number" placeholder="e.g. 6.5">

        <label>Stress Level (0-10)</label>
        <input id="stress" type="number" placeholder="e.g. 7">

        <label>Study Hours</label>
        <input id="study" type="number" placeholder="e.g. 8">

        <label>Deadline (days left)</label>
        <input id="deadline" type="number" placeholder="e.g. 3">

        <label>Gemini API Key (optional)</label>
        <input id="apiKey" type="password" placeholder="AIza...">

        <button class="primary-btn" onclick="analyze()">
          Run AI Analysis
        </button>

      </div>

      <!-- RESULT CARD -->
      <div class="card glass">

        <h2>Burnout Score</h2>

        <div id="resultCard" class="result-box">
          <p class="muted">Enter your data to analyze burnout level</p>
        </div>

        <!-- GAUGE -->
        <div class="gauge-container">
          <svg class="gauge" viewBox="0 0 100 100">
            <circle class="bg" cx="50" cy="50" r="40"></circle>
            <circle id="gaugeFill" class="fill" cx="50" cy="50" r="40"></circle>
          </svg>
          <div id="gaugeText" class="gauge-text">0%</div>
        </div>

      </div>

      <!-- AI CHAT -->
      <div class="card glass ai-card">

        <h2>AI Study Coach</h2>

        <div id="chat" class="chat-box"></div>

        <div class="chat-input">
          <input id="userMsg" placeholder="Ask your AI coach..." />
          <button onclick="sendMsg()">➤</button>
        </div>

      </div>

    </section>

    <!-- CHART -->
    <section class="chart-section">
      <canvas id="burnoutChart"></canvas>
    </section>

  </main>

</div>

</body>
</html>
