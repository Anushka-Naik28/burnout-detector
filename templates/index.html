<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">🧠 Burnout AI</div>
    <p class="tagline">Smart Study Wellness System</p>

    <div class="nav-item active">📊 Analysis</div>
    <div class="nav-item">🤖 AI Assistant</div>
    <div class="nav-item">📈 History</div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOP HEADER -->
    <header class="header">
      <h1>Burnout Analysis Dashboard</h1>
      <p>Track, analyze and optimize your study performance</p>
    </header>

    <!-- GRID -->
    <section class="grid">

      <!-- INPUT CARD -->
      <div class="card glass">

        <h2>Input Metrics</h2>

        <label>Sleep Hours</label>
        <input id="sleep" type="number" placeholder="e.g. 6.5">

        <label>Stress Level</label>
        <input id="stress" type="number" placeholder="0 - 10">

        <label>Study Hours</label>
        <input id="study" type="number" placeholder="e.g. 8">

        <label>Deadline (days left)</label>
        <input id="deadline" type="number">

        <label>Gemini API Key</label>
        <input id="apiKey" type="password" placeholder="Optional">

        <button class="primary-btn" onclick="analyze()">
          Run AI Analysis
        </button>

      </div>

      <!-- RESULT CARD -->
      <div class="card glass">

        <h2>Burnout Intelligence</h2>

        <div id="resultCard" class="result-box">
          <p class="muted">Awaiting analysis...</p>
        </div>

      </div>

      <!-- AI PANEL -->
      <div class="card glass ai-card">

        <h2>AI Study Coach</h2>

        <div id="chat" class="chat-box"></div>

        <div class="chat-input">
          <input id="userMsg" placeholder="Ask your AI coach..." />
          <button onclick="sendMsg()">➤</button>
        </div>

      </div>

    </section>

  </main>

</div>
